<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Contact Form Submission</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f3f4f6; -webkit-font-smoothing: antialiased;">
  <div style="width: 100%; background-color: #f3f4f6; padding: 40px 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <div style="max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); border: 1px solid #eaedf0;">
      
      <!-- Header -->
      <div style="background: linear-gradient(135deg, #1755cf 0%, #0c3da2 100%); padding: 35px 40px; color: #ffffff;">
        <h1 style="margin: 0; font-size: 24px; font-weight: 600; letter-spacing: -0.5px;">New Contact Form Submission</h1>
        <p style="margin: 8px 0 0 0; font-size: 14px; color: rgba(255, 255, 255, 0.85); font-weight: 300;">Received from your portfolio website</p>
      </div>

      <!-- Content -->
      <div style="padding: 40px;">
        
        <!-- Sender Name -->
        <div style="margin-bottom: 28px; border-bottom: 1px solid #f3f4f6; padding-bottom: 16px;">
          <span style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #1755cf; margin-bottom: 6px; display: block;">Sender Name</span>
          <div style="font-size: 16px; color: #1f2937; line-weight: 1.5; font-weight: 500;">{{name}}</div>
        </div>

        <!-- Email Address -->
        <div style="margin-bottom: 28px; border-bottom: 1px solid #f3f4f6; padding-bottom: 16px;">
          <span style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #1755cf; margin-bottom: 6px; display: block;">Email Address</span>
          <div style="font-size: 16px; color: #1f2937; line-weight: 1.5; font-weight: 500;">
            <a href="mailto:{{email}}" style="color: #1755cf; text-decoration: none; border-bottom: 1px dashed rgba(23, 85, 207, 0.4);">{{email}}</a>
          </div>
        </div>

        <!-- Subject -->
        <div style="margin-bottom: 28px; border-bottom: 1px solid #f3f4f6; padding-bottom: 16px;">
          <span style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #1755cf; margin-bottom: 6px; display: block;">Subject</span>
          <div style="font-size: 16px; color: #1f2937; line-weight: 1.5; font-weight: 500;">{{subject}}</div>
        </div>

        <!-- Message -->
        <div style="margin-bottom: 0; padding-bottom: 0;">
          <span style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #1755cf; margin-bottom: 6px; display: block;">Message</span>
          <div style="background-color: #f9fafb; border-left: 4px solid #1755cf; border-radius: 4px 8px 8px 4px; padding: 24px; margin-top: 8px; font-size: 15px; color: #374151; line-height: 1.6; white-space: pre-wrap; font-weight: 400; font-family: inherit;">{{message}}</div>
        </div>

      </div>

      <!-- Footer -->
      <div style="background-color: #fafbfc; padding: 25px 40px; text-align: center; border-top: 1px solid #eaedf0;">
        <p style="margin: 0; font-size: 13px; color: #9ca3af; font-weight: 400;">
          Sent automatically via EmailJS Integration on your <a href="https://muazashraf.site" style="color: #1755cf; text-decoration: none; font-weight: 500;">Portfolio Website</a>
        </p>
      </div>

    </div>
  </div>
</body>
</html>
